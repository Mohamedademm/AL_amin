name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  client:
    name: Client (typecheck · build · tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:coverage

  server:
    name: Server (typecheck · integration tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: alamin_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U user -d alamin_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://user:password@localhost:5433/alamin_db?schema=public
      JWT_SECRET: ci_test_secret_at_least_32_characters_long_0
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx tsx prisma/seed.ts
      - run: npx tsc --noEmit
      - name: Start API and run integration tests
        run: |
          npm run dev &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/health > /dev/null; then echo "API up"; break; fi
            sleep 1
          done
          npm test
      - name: Run k6 load test
        run: docker run --rm -i --network host -v ${{ github.workspace }}/server/tests/load/k6-50users.js:/k6.js grafana/k6 run /k6.js
