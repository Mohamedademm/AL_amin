services:
  postgres:
    image: postgres:16-alpine
    container_name: alamin-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: alamin_db
    # Host port 5433 (5432 is often taken by another local Postgres)
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d alamin_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
